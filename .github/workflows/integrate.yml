name: Python Backend

on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

    # below will be uncommented once we start setting up unit tests
    #  - name: Install Dependencies
    #    run: |
    #      python -m pip install --upgrade pip
    #      pip install -r requirements.txt
      - name: Verify Env
        run: |
          python --version
          echo "python working!"
